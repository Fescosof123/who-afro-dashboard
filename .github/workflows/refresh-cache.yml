name: Refresh RSS Cache

# Runs hourly on GitHub's clean IPs (not blocked by ReliefWeb / OCHA / WHO CDNs).
# Fetches every blocked RSS feed, writes the cache JSON files, commits them back,
# and pushes so deployments always have a fresh snapshot even when runtime egress
# is blocked by upstream providers.

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS feeds and update cache files
        id: refresh
        run: node scripts/refresh-rss-cache.js
        continue-on-error: true

      - name: Commit updated cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json || true
          git diff --cached --quiet && echo "No changes - skipping commit" && exit 0
          git commit -m "Auto-refresh: RSS cache update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
